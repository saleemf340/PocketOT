<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (exercise(); as exerciseRef) {
      <div>
        <h2 data-cy="exerciseDetailsHeading"><span jhiTranslate="pocketOtApp.exercise.detail.title">Exercise</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ exerciseRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="pocketOtApp.exercise.uuid">Uuid</span></dt>
          <dd>
            <span>{{ exerciseRef.uuid }}</span>
          </dd>
          <dt><span jhiTranslate="pocketOtApp.exercise.name">Name</span></dt>
          <dd>
            <span>{{ exerciseRef.name }}</span>
          </dd>
          <dt><span jhiTranslate="pocketOtApp.exercise.videoLink">Video Link</span></dt>
          <dd>
            <span>{{ exerciseRef.videoLink }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/exercise', exerciseRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
